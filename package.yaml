name: chemalgprog
version: 0.1.0.0
synopsis: Chemical Algorithmic Programming
description: A library for molecular representation and probabilistic programming.
category: Development
author: Oliver Goldstein
maintainer: oliverjgoldstein@gmail.com, oliver.goldstein@cs.ox.ac.uk, sammarch2@gmail.com
license: AGPL-3.0-only
license-file: LICENSE
extra-source-files:
  - CHANGELOG.md
  - README.md
dependencies:
  - base >= 4.13 && < 4.21
  - monad-extras
  - transformers
  - mtl
  - deepseq
  - containers
  - ghc-heap
  - megaparsec >= 9.0 && < 10.0
  - vector
  - directory
  - filepath
  - bytestring
  - binary
  - text
  - random
  - log-domain
  - statistics
  - array
  - parallel
  - massiv

library:
  source-dirs: src
  exposed-modules:
    - Constants
    - LogPModel
    - PrettyBenzene
  other-modules:
    - Benzene
    - Chem.Dietz
    - Chem.IO.SDF
    - Chem.Molecule
    - Chem.Molecule.Coordinate
    - Chem.Validate
    - Distr
    - EffectfulCode.Python.Analyse.WalkTree
    - EffectfulCode.Python.Analyse.WalkTree.Compat
    - ExtraF
    - Group
    - LazyPPL
    - MolADT
    - MolADT.LogP
    - MolADT.Molecule
    - MolADT.Parse
    - MolADT.Samples
    - MolADT.Serialization
    - MolADT.Validate
    - Orbital
    - Reaction
    - SampleMolecules
    - Serialisable
    - SlaterTypeOrbital
  language: Haskell2010

executables:
  chemalgprog:
    main: RunLogP.hs
    source-dirs: examples
    dependencies:
      - chemalgprog
      - massiv
    language: Haskell2010
  parse-molecules:
    main: ParseMolecules.hs
    source-dirs: examples
    dependencies:
      - chemalgprog
      - massiv
    language: Haskell2010
  serialize-molecule:
    main: Serialize.hs
    source-dirs: examples
    dependencies:
      - chemalgprog
      - massiv
    language: Haskell2010

tests:
  parser-roundtrip:
    main: ParserRoundTrip.hs
    source-dirs: test
    dependencies:
      - chemalgprog
      - hspec
      - containers
      - megaparsec >= 9.0 && < 10.0
      - massiv
    language: Haskell2010
  validation-properties:
    main: ValidationProperties.hs
    source-dirs: test
    dependencies:
      - chemalgprog
      - QuickCheck
      - containers
      - massiv
    language: Haskell2010
  edge-properties:
    main: EdgeProperties.hs
    source-dirs: test
    dependencies:
      - chemalgprog
      - QuickCheck
      - containers
      - massiv
    language: Haskell2010
